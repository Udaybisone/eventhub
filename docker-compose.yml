# Local development Postgres for EventHub.
# Production uses Neon (free tier); this is only for local dev + verification.
services:
  db:
    image: postgres:16-alpine
    container_name: eventhub-db
    environment:
      POSTGRES_DB: eventhub
      POSTGRES_USER: eventhub
      POSTGRES_PASSWORD: eventhub
    ports:
      - "5432:5432"
    volumes:
      - eventhub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventhub"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  eventhub_pgdata:
