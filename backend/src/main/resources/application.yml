spring:
  application:
    name: eventhub

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/eventhub}
    username: ${DATABASE_USER:eventhub}
    password: ${DATABASE_PASSWORD:eventhub}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

app:
  # Comma-separated list of allowed frontend origins.
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}

  jwt:
    # MUST be overridden in production. >= 32 chars for HS256.
    secret: ${APP_JWT_SECRET:dev-only-insecure-secret-change-me-32+chars}
    access-token-ttl: ${APP_JWT_ACCESS_TTL:PT15M}
    refresh-token-ttl: ${APP_JWT_REFRESH_TTL:P30D}

  auth:
    password-reset-ttl: ${APP_PASSWORD_RESET_TTL:PT1H}

  email:
    # When resend.api-key is set, real emails are sent; otherwise emails are logged.
    from: ${APP_EMAIL_FROM:EventHub <noreply@eventhub.local>}
    resend:
      api-key: ${APP_RESEND_API_KEY:}

  # Shared secret for cron-triggered /internal endpoints. Empty = open (dev only).
  internal:
    secret: ${APP_INTERNAL_SECRET:}

  # If set, the user with this email is promoted to ADMIN on startup.
  admin:
    bootstrap-email: ${APP_ADMIN_EMAIL:}
